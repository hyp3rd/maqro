---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-json
      - id: pretty-format-json
        exclude: |
          (?x)^(
              .vscode/settings.json|
              .prettierrc.json|
              components.json|
              cspell.json|
              package.json|
              package-lock.json|
              packages/core/package.json|
              tsconfig.json|
              test-results/.last-run.json|
              vercel.json|
              examples/oidc/keycloak/realm.json|
              messages/en.json|
              messages/it.json|
              public/ciqual-database.json|
              eslint-rules/package.json
          )$
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
      - id: fix-byte-order-marker
      - id: check-executables-have-shebangs
      - id: check-yaml
        files: .*\.(yaml|yml)$
        # mkdocs.yml uses custom !! tags PyYAML doesn't grok.
        # chart/**/templates/ contains Helm templates whose
        # `{{ ... }}` Go-template syntax PyYAML can't parse -
        # `helm lint` is the right validator for those.
        exclude: ^(mkdocs\.yml|chart/.*/templates/.*)$
        args: [--allow-multiple-documents]
      - id: requirements-txt-fixer
      # - id: no-commit-to-branch
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        files: \.(yaml|yml)$
        # Same exclusion as check-yaml above - Helm templates
        # have their own validator (`helm lint`).
        exclude: ^chart/.*/templates/.*$
        types: [file, yaml]
        entry: yamllint --strict -f parsable
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v10.0.0
    hooks:
      # Spell check changed files
      - id: cspell
      # Spell check the commit message
      - id: cspell
        name: check commit message spelling
        args:
          - --no-must-find-files
          - --no-progress
          - --no-summary
          - --files
          - .git/COMMIT_EDITMSG
        stages: [commit-msg]
        always_run: true
  - repo: https://github.com/markdownlint/markdownlint.git
    rev: v0.15.0
    hooks:
      - id: markdownlint
        name: Markdownlint
        description: Run markdownlint on your Markdown files
        entry: mdl
        language: ruby
        files: \.(md|mdown|markdown)$
