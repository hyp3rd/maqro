<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Offline — Maqro</title>
    <meta
      name="theme-color"
      content="#0a0a0c"
    />
    <!--
      Static, JS-free fallback served by the service worker when a
      navigation request fails. Kept intentionally tiny so it
      precaches cheaply and renders fast on weak connections.

      The page tells the user what happened, what they CAN still do
      (the local data is in IndexedDB and the rest of the app is in
      the cache, so a subsequent navigation usually succeeds), and
      gives a one-tap retry.
    -->
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #0a0a0c;
        --muted: #6b7280;
        --border: rgba(0, 0, 0, 0.12);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0c;
          --fg: #f4f4f5;
          --muted: #a1a1aa;
          --border: rgba(255, 255, 255, 0.12);
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        text-align: center;
      }
      .card {
        max-width: 28rem;
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        padding: 1.5rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 0 1rem;
        font-size: 0.875rem;
        line-height: 1.55;
        color: var(--muted);
      }
      button {
        appearance: none;
        background: var(--fg);
        color: var(--bg);
        border: 0;
        border-radius: 0.5rem;
        padding: 0.625rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
      }
      button:active {
        transform: translateY(1px);
      }
      .icon {
        width: 2rem;
        height: 2rem;
        margin: 0 auto 0.75rem;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <!-- Brand mark inlined so the offline page has zero
             dependencies (no /logo-mark.svg fetch — that asset
             might be cached but we don't want to gamble on it). -->
        <svg
          viewBox="0 0 64 74"
          width="22"
          height="26"
          aria-label="Maqro"
          role="img"
          style="margin: 0 auto 1rem; display: block; opacity: 0.85"
        >
          <title>Maqro</title>
          <rect
            x="10"
            y="14"
            width="8"
            height="56"
            fill="currentColor"
          />
          <rect
            x="42"
            y="14"
            width="8"
            height="42"
            fill="currentColor"
          />
          <rect
            x="10"
            y="48"
            width="40"
            height="8"
            fill="currentColor"
          />
          <circle
            cx="58"
            cy="10"
            r="3"
            fill="currentColor"
          />
        </svg>
        <svg
          class="icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M1 1l22 22" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <line
            x1="12"
            y1="20"
            x2="12.01"
            y2="20"
          />
        </svg>
        <h1>You're offline</h1>
        <p>
          Maqro can't reach the network right now. Your data is safe on this
          device. Try again in a moment — most pages will load from cache once
          you reconnect.
        </p>
        <button
          type="button"
          onclick="window.location.reload()"
        >
          Retry
        </button>
      </section>
    </main>
  </body>
</html>
